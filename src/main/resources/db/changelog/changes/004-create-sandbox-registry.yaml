databaseChangeLog:
  - changeSet:
      id: 004-create-sandbox-registry
      author: backup-monitor
      comment: "Persistente Registry für provisionierte Sandbox-CF-Service-Instances"
      changes:
        - createTable:
            tableName: sandbox_registry
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_sandbox_registry
              - column:
                  name: instance_id
                  type: VARCHAR(128)
                  constraints:
                    nullable: false
              - column:
                  name: manager_id
                  type: VARCHAR(128)
                  constraints:
                    nullable: false
              - column:
                  name: mode
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
                  remarks: "EXISTING | PROVISION"
              - column:
                  name: cf_service_instance_name
                  type: VARCHAR(256)
                  remarks: "null wenn mode=EXISTING"
              - column:
                  name: cf_service_instance_guid
                  type: VARCHAR(128)
              - column:
                  name: sandbox_host
                  type: VARCHAR(512)
                  constraints:
                    nullable: false
              - column:
                  name: sandbox_port
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: sandbox_database
                  type: VARCHAR(256)
                  constraints:
                    nullable: false
              - column:
                  name: sandbox_username
                  type: VARCHAR(256)
              - column:
                  name: sandbox_password_enc
                  type: TEXT
                  remarks: "AES-verschlüsseltes Passwort"
              - column:
                  name: provisioned_at
                  type: TIMESTAMP WITH TIME ZONE
        - addUniqueConstraint:
            tableName: sandbox_registry
            columnNames: instance_id
            constraintName: uq_sandbox_registry_instance
        - sql:
            sql: "ALTER TABLE sandbox_registry ADD CONSTRAINT chk_sandbox_mode CHECK (mode IN ('EXISTING', 'PROVISION'))"
        - createIndex:
            tableName: sandbox_registry
            indexName: idx_sandbox_registry_instance
            columns:
              - column:
                  name: instance_id

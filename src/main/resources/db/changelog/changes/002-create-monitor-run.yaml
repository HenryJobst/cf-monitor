databaseChangeLog:
  - changeSet:
      id: 002-create-monitor-run
      author: backup-monitor
      comment: "Prüflauf-Ergebnisse, Retention pro (instance_id, run_type)"
      changes:
        - createTable:
            tableName: monitor_run
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_monitor_run
              - column:
                  name: manager_id
                  type: VARCHAR(128)
                  constraints:
                    nullable: false
              - column:
                  name: instance_id
                  type: VARCHAR(128)
                  constraints:
                    nullable: false
              - column:
                  name: instance_name
                  type: VARCHAR(256)
              - column:
                  name: run_type
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
                  remarks: "JOB_CHECK | RESTORE_TEST"
              - column:
                  name: started_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: finished_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: status
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
                  remarks: "OK | FAILED | SKIPPED | ERROR | RUNNING"
              - column:
                  name: details
                  type: JSONB
              - column:
                  name: error_message
                  type: TEXT
        - sql:
            sql: "ALTER TABLE monitor_run ADD CONSTRAINT chk_monitor_run_type CHECK (run_type IN ('JOB_CHECK', 'RESTORE_TEST'))"
        - sql:
            sql: "ALTER TABLE monitor_run ADD CONSTRAINT chk_monitor_run_status CHECK (status IN ('OK', 'FAILED', 'SKIPPED', 'ERROR', 'RUNNING'))"
        - createIndex:
            tableName: monitor_run
            indexName: idx_monitor_run_instance_type_time
            columns:
              - column:
                  name: manager_id
              - column:
                  name: instance_id
              - column:
                  name: run_type
              - column:
                  name: started_at
                  descending: true

databaseChangeLog:
  - changeSet:
      id: 005-create-shedlock
      author: backup-monitor
      comment: "ShedLock-Tabelle für Distributed Locking der Scheduled Jobs"
      changes:
        - createTable:
            tableName: shedlock
            columns:
              - column:
                  name: name
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_shedlock
              - column:
                  name: lock_until
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: locked_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: locked_by
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

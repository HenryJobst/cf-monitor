databaseChangeLog:
  - changeSet:
      id: 001-create-stored-token
      author: backup-monitor
      comment: "OAuth2-Token-Speicher (AES-verschlüsselt) je Manager-Instanz"
      changes:
        - createTable:
            tableName: stored_token
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_stored_token
              - column:
                  name: manager_id
                  type: VARCHAR(128)
                  constraints:
                    nullable: false
              - column:
                  name: uaa_endpoint
                  type: VARCHAR(512)
                  constraints:
                    nullable: false
              - column:
                  name: access_token_enc
                  type: TEXT
                  remarks: "AES-verschlüsselter Access Token"
              - column:
                  name: access_token_expiry
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: refresh_token_enc
                  type: TEXT
                  remarks: "AES-verschlüsselter Refresh Token"
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: stored_token
            columnNames: manager_id
            constraintName: uq_stored_token_manager
        - createIndex:
            tableName: stored_token
            indexName: idx_stored_token_manager_id
            columns:
              - column:
                  name: manager_id

databaseChangeLog:
  - changeSet:
      id: 006-create-s3-check-result
      author: backup-monitor
      comment: "S3-Verifikationsergebnisse pro Backup-Job"
      changes:
        - createTable:
            tableName: s3_check_result
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_s3_check_result
              - column:
                  name: manager_id
                  type: VARCHAR(128)
                  constraints:
                    nullable: false
              - column:
                  name: instance_id
                  type: VARCHAR(128)
                  constraints:
                    nullable: false
              - column:
                  name: backup_job_id
                  type: VARCHAR(256)
                  constraints:
                    nullable: false
              - column:
                  name: filename
                  type: VARCHAR(512)
              - column:
                  name: bucket
                  type: VARCHAR(256)
              - column:
                  name: exists
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: size_expected_bytes
                  type: BIGINT
              - column:
                  name: size_actual_bytes
                  type: BIGINT
              - column:
                  name: size_match_within_tolerance
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: size_deviation_percent
                  type: DECIMAL(6,2)
              - column:
                  name: accessible
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: magic_bytes_valid
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: all_passed
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: error_message
                  type: TEXT
                  remarks: "Gesetzt bei unerwarteten Exceptions während der Prüfung"
              - column:
                  name: checked_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
                  defaultValueComputed: NOW()
        - createIndex:
            tableName: s3_check_result
            indexName: idx_s3_check_instance_time
            columns:
              - column:
                  name: instance_id
              - column:
                  name: checked_at
                  descending: true
        - createIndex:
            tableName: s3_check_result
            indexName: idx_s3_check_job_id
            columns:
              - column:
                  name: backup_job_id
        - createIndex:
            tableName: s3_check_result
            indexName: idx_s3_check_passed_instance
            columns:
              - column:
                  name: all_passed
              - column:
                  name: instance_id
              - column:
                  name: checked_at
                  descending: true

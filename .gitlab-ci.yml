stages:
  - test
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  # Image für den Deploy-Job – muss die CF CLI (cf8) enthalten.
  # Kann in den CI/CD-Variablen des Projekts überschrieben werden.
  CF_DEPLOY_IMAGE: "ubuntu:24.04"

cache:
  key: "$CI_PROJECT_ID"
  paths:
    - .m2/repository/

# ── Test ───────────────────────────────────────────────────────────────────────
# Testcontainers (PostgreSQL, MinIO) brauchen einen laufenden Docker-Daemon.
test:
  stage: test
  image: maven:3.9-eclipse-temurin-21
  script:
    - mvn verify -DexcludedGroups=integration -DskipITs
  artifacts:
    paths:
      - target/cf-backup-monitor-*.jar
    expire_in: 1 hour

# ── Deploy (cf push --strategy rolling) ───────────────────────────────────────
# Läuft nur auf dem Default-Branch (main) und bei Tags.
# Erforderliche CI/CD-Variablen (geschützt setzen):
#   CF_API, CF_USERNAME, CF_PASSWORD, CF_ORG, CF_SPACE
#   CF_DEPLOY_IMAGE  – Image mit vorinstallierter CF CLI (überschreibt den Standard)
deploy:
  stage: deploy
  image: "$CF_DEPLOY_IMAGE"
  before_script:
    - cf api "$CF_API"
    - cf auth "$CF_USERNAME" "$CF_PASSWORD"
    - cf target -o "$CF_ORG" -s "$CF_SPACE"
  script:
    - cp target/cf-backup-monitor-*.jar target/app.jar
    - cf push --manifest manifest.yml --strategy rolling
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
  dependencies:
    - test

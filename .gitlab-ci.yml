stages:
  - test
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

cache:
  key: "$CI_PROJECT_ID"
  paths:
    - .m2/repository/

# ── Test ───────────────────────────────────────────────────────────────────────
# Testcontainers (PostgreSQL, MinIO) brauchen einen laufenden Docker-Daemon.
test:
  stage: test
  image: maven:3.9-eclipse-temurin-21
  script:
    - mvn verify -DexcludedGroups=integration
  artifacts:
    paths:
      - target/cf-backup-monitor-*.jar
    expire_in: 1 hour

# ── Deploy (cf push --strategy rolling) ───────────────────────────────────────
# Läuft nur auf dem Default-Branch (main) und bei Tags.
# Erforderliche CI/CD-Variablen (geschützt setzen):
#   CF_API, CF_USERNAME, CF_PASSWORD, CF_ORG, CF_SPACE
deploy:
  stage: deploy
  image: ubuntu:24.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl
    - curl -fsSL "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v8" -o cf.tgz
    - tar -xzf cf.tgz && mv cf8 /usr/local/bin/cf
    - cf api "$CF_API"
    - cf auth "$CF_USERNAME" "$CF_PASSWORD"
    - cf target -o "$CF_ORG" -s "$CF_SPACE"
  script:
    - cp target/cf-backup-monitor-*.jar target/app.jar
    - cf push --manifest manifest.yml --strategy rolling
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
  dependencies:
    - test
